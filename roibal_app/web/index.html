<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Tu balance personal en la palma de tu mano">

  <!-- Open Graph / WhatsApp / social preview -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="ROIBAL">
  <meta property="og:description" content="Tu balance personal en la palma de tu mano">
  <meta property="og:image" content="https://roibal.netlify.app/icons/Icon-512.png">
  <meta property="og:url" content="https://roibal.netlify.app">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ROIBAL">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ROIBAL</title>
  <link rel="manifest" href="manifest.json">

  <!--
    roibal_app does not use WebAuthn/Passkey login (only Google OAuth via
    Supabase). The `passkeys_web` plugin is pulled in transitively by
    supabase_flutter and unconditionally calls `PasskeyAuthenticator.init()`
    on every boot, crashing the app if that global isn't defined. Stub it
    instead of loading Corbado's third-party bundle.js.
  -->
  <script>
    window.PasskeyAuthenticator = {
      init: function () {},
      register: function () { return Promise.reject('Passkeys not supported'); },
      login: function () { return Promise.reject('Passkeys not supported'); },
      cancelCurrentAuthenticatorOperation: function () {},
      isUserVerifyingPlatformAuthenticatorAvailable: function () { return Promise.resolve(false); },
      isConditionalMediationAvailable: function () { return Promise.resolve(false); },
      hasPasskeySupport: function () { return false; }
    };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
